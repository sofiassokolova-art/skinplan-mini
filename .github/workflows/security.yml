name: Security Checks

permissions:
  contents: read

on:
  push:
    branches: [main, develop, production]
  pull_request:
    branches: [main, develop, production]
  schedule:
    # Запускается каждый день в 3:00 UTC
    - cron: '0 3 * * *'

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        # NOTE: devDependencies (e.g. vercel CLI) can trigger audit noise and block merges.
        # We focus this job on production dependency risk.
        run: npm audit --omit=dev --audit-level=moderate
      
      - name: Check for vulnerabilities
        run: |
          if npm audit --omit=dev --audit-level=high --json | jq -e '(.metadata.vulnerabilities.high // 0) > 0 or (.metadata.vulnerabilities.critical // 0) > 0' > /dev/null; then
            echo "❌ High/Critical vulnerabilities found (prod deps)!"
            npm audit --omit=dev --audit-level=high
            exit 1
          else
            echo "✅ No high/critical vulnerabilities found (prod deps)"
          fi

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run secret scan
        run: npm run secrets:scan

  lint-security:
    name: ESLint Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

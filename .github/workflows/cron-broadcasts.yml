# Внешний планировщик для отложенных рассылок и чистки логов (PROD).
#
# Почему так: Cloudflare Workers Cron вызывает scheduled() handler воркера,
# а не HTTP-роуты Next.js. Поэтому эндпоинты дёргаем извне с CRON_SECRET.
#
# ВАЖНО: рассылки бьём НАПРЯМУЮ в /api/admin/broadcasts/worker (POST) — он
# поддерживает cron-вызов через "Authorization: Bearer <CRON_SECRET>" (isCronCall).
# НЕ через /api/cron/broadcasts: тот делает self-subrequest воркера на собственный
# публичный хост, что на CF Workers падает с "error code: 522" (connection timed out).
#
# Частота рассылок: каждые 30 минут.
#   ~1440 job-запусков/мес ≈ 1440 бесплатных минут (лимит приватного репо — 2000/мес).
#   Нужно чаще/точнее бесплатно — используй cron-job.org (granularity 1 мин, без лимита минут):
#     URL:    https://proskiniq.ru/api/admin/broadcasts/worker  (метод POST)
#     Header: Authorization: Bearer <CRON_SECRET>
#   GitHub Actions cron НЕточен: тики могут опаздывать на 5–15 мин и иногда пропускаться.
#
# Секрет CRON_SECRET хранится в Settings → Secrets and variables → Actions
# и ДОЛЖЕН совпадать с секретом prod-воркера (wrangler secret put CRON_SECRET --env production).
name: Cron — broadcasts & log cleanup (prod)

on:
  schedule:
    - cron: '*/30 * * * *'   # отложенные рассылки — каждые 30 минут
    - cron: '17 3 * * 0'     # чистка client_logs — еженедельно, вс 03:17 UTC
    - cron: '0 10 * * *'     # win-back продления — ежедневно 10:00 UTC (13:00 МСК)
    - cron: '0 */3 * * *'    # догоняющие сообщения воронки — каждые 3 часа
  workflow_dispatch: {}        # ручной запуск из вкладки Actions

concurrency:
  group: cron-broadcasts-prod
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process scheduled broadcasts
        run: |
          curl -fsS --max-time 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://proskiniq.ru/api/admin/broadcasts/worker"

      - name: Weekly client_logs cleanup
        if: github.event.schedule == '17 3 * * 0'
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://proskiniq.ru/api/cron/cleanup-logs"

      - name: Daily win-back renewal offers
        if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://proskiniq.ru/api/cron/winback"

      - name: Funnel nudges (unfinished quiz / unpaid first plan)
        if: github.event.schedule == '0 */3 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://proskiniq.ru/api/cron/funnel-nudges"

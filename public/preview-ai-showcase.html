<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/image 1576994963.png');
    background-size: cover;
    background-position: center top;
  }
  .content {
    position: relative;
    z-index: 1;
    padding: clamp(56px, 18vw, 80px) clamp(16px, 5vw, 24px) clamp(100px, 25vw, 130px);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 6vw, 28px);
    line-height: 1.25;
    color: #000;
    margin-bottom: 0;
    letter-spacing: -0.3px;
    max-width: min(260px, 70%);
  }
  .card {
    margin-top: auto;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 24px;
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  }
  .item {
    font-family: 'Inter', sans-serif;
    font-size: clamp(13px, 3.8vw, 16px);
    line-height: 1.4;
    color: #000;
  }
  .item strong {
    font-weight: 700;
  }
  .btn-wrap {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    display: flex;
    justify-content: center;
  }
  .btn {
    display: block;
    width: min(300px, 100%);
    background: #D5FE61;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    height: 40px;
    text-align: center;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <h1>SkinIQ использует ИИ для подбора ухода, который действительно работает</h1>
  <div class="card">
    <p class="item"><strong>95%</strong> точность рекомендаций</p>
    <p class="item"><strong>Поддержка+</strong> активных ингредиентов</p>
    <p class="item"><strong>Обучение</strong> на данных, подтвержденных дерматологами</p>
  </div>
</div>
<div class="btn-wrap">
  <button class="btn">ПРОДОЛЖИТЬ</button>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    width: 390px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/image 1576994970.png');
    background-size: cover;
    background-position: center top;
  }
  .content {
    position: relative;
    z-index: 1;
    padding: 110px 20px 140px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 26px;
    line-height: 1.25;
    color: #000;
    margin-bottom: 0;
    letter-spacing: -0.3px;
    max-width: 200px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: auto;
    padding-bottom: 96px;
  }
  .card {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 20px 20px 20px 16px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  }
  .card-icon {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-text {
    flex: 1;
  }
  .card-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #000;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .card-desc {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #444;
  }
  .btn-wrap {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    padding: 0 20px;
    display: flex;
    justify-content: center;
  }
  .btn {
    display: block;
    width: 300px;
    background: #D5FE61;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    height: 40px;
    text-align: center;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <h1>SkinIQ заботится<br>о вашем здоровье</h1>
  <div class="cards">
    <div class="card">
      <div class="card-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 3 L30 8 L30 18 C30 25 24 30 18 33 C12 30 6 25 6 18 L6 8 Z"/>
          <polyline points="13,18 16,21 23,14"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">Безопасность</div>
        <div class="card-desc">Все рекомендации по уходу одобрены врачами дерматологами и абсолютно безопасны</div>
      </div>
    </div>
    <div class="card">
      <div class="card-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="16" width="20" height="16" rx="3"/>
          <path d="M12 16 L12 11 C12 7.7 14.7 5 18 5 C21.3 5 24 7.7 24 11 L24 16"/>
          <circle cx="18" cy="24" r="2" fill="#555" stroke="none"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">Конфиденциальность</div>
        <div class="card-desc">Вся информация остается конфиденциальной и используется только для персональных рекомендаций</div>
      </div>
    </div>
  </div>
</div>
<div class="btn-wrap">
  <button class="btn">ПРОДОЛЖИТЬ</button>
</div>
</body>
</html>

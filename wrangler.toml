# Cloudflare Workers configuration for skinplan-mini
# Build: npm run build:cf
# Deploy: npx wrangler deploy

name = "skinplan-mini"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cron trigger — calls GET /api/cron/cleanup-logs (auth via CRON_SECRET)
[triggers]
crons = ["0 0 * * 0"]
